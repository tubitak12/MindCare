publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  
  # Güvenlik ve Şifreleme
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2
  
